services:
  auth-center:
    image: auth-center
    container_name: auth-center
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    restart: always
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./config:/app/config
    networks:
      - infra-net

networks:
  infra-net:
    external: true
