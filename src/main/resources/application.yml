server:
  port: 8080
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/box_wds?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true&sslMode=DISABLED
    username: root
    password: ${DB_PASSWORD}
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0
      timeout: 5s
      password: ${REDIS_PASSWORD}

      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 1
          max-wait: -1ms
mybatis:
  mapper-locations: classpath:/mapper/*.xml
  type-aliases-package: com.box.auth.domain
  configuration:
    map-underscore-to-camel-case: true # 把数据库里的下划线字段名，自动映射成 Java 的驼峰属性名
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 输出sql日志

# 业务系统白名单
box:
  security:
    permit-paths:
      - /
      - /index.html
      - /auth/login
      - /auth/check
      - /auth/refresh
    jwt:
      issuer: "auth-center"   # JWT 签发方（iss）
      audience:               # 受众
        - "example-app"
      secret: "0123456789abcdef0123456789abcdef"  # 密钥

